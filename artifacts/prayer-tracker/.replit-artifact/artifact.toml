kind = "web"
previewPath = "/"
title = "متابعة الصلاة للأطفال"
version = "1.0.0"
id = "artifacts/prayer-tracker"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23980

[services.development]
run = "pnpm --filter @workspace/prayer-tracker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/prayer-tracker", "run", "build" ]
publicDir = "artifacts/prayer-tracker/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23980"
BASE_PATH = "/"
